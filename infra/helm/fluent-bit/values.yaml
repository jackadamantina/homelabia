image:
  repository: fluentbit-local
  tag: "5.0.3"
  pullPolicy: Never

daemonset:
  enabled: true

hotReload:
  enabled: false

config:
  service: |
    [SERVICE]
        Daemon          Off
        Log_Level       info
        Parsers_File    /fluent-bit/etc/parsers.conf
        HTTP_Server     On
        HTTP_Listen     0.0.0.0
        HTTP_Port       2020

  inputs: |
    [INPUT]
        Name              tail
        Tag               kube.*
        Path              /var/log/containers/*.log
        Parser            cri
        Read_From_Head    On
        DB                /var/log/flb_kube.db
        Mem_Buf_Limit     20MB
        Buffer_Max_Size   2MB
        Skip_Long_Lines   On

  filters: |
    [FILTER]
        Name                kubernetes
        Match               kube.*
        Kube_URL            https://kubernetes.default.svc:443
        Kube_CA_File        /var/run/secrets/kubernetes.io/serviceaccount/ca.crt
        Kube_Token_File     /var/run/secrets/kubernetes.io/serviceaccount/token
        Kube_Tag_Prefix     kube.var.log.containers.
        Merge_Log           Off
        Keep_Log            Off
        K8S-Logging.Parser  On
        K8S-Logging.Exclude Off

  outputs: |
    [OUTPUT]
        Name                es
        Match               kube.*
        Host                elasticsearch-master
        Port                9200
        tls                 Off
        Suppress_Type_Name  On
        Index               logs
        Logstash_Format     Off
        Retry_Limit         False
        Workers             1

tolerations:
  - key: node-role.kubernetes.io/control-plane
    operator: Exists
    effect: NoSchedule
