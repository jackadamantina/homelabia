replicas: 1
image: "elasticsearch-local"
imageTag: "8.5.1"
imagePullPolicy: Never
antiAffinity: soft
protocol: http
createCert: false      # evita que o chart injete env vars de TLS no pod

esJavaOpts: "-Xmx1g -Xms1g"

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1000m"
    memory: "2Gi"

esConfig:
  elasticsearch.yml: |
    xpack.security.enabled: false
