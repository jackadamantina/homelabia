apiVersion: v1
kind: Secret
metadata:
  name: homelab-repo-secret
  namespace: argocd
  labels:
    argocd.argoproj.io/secret-type: repository
stringData:
  url: https://github.com/jackadamantina/homelabia.git
  type: git
  insecure: "true"    # ignora validação TLS (proxy corporativo com cert próprio)
